x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  vaultwarden:
    image: ${VAULTWARDEN_IMAGE:-vaultwarden/server:1.35.7-alpine}
    container_name: vaultwarden
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    expose:
      - "8080"
    volumes:
      - ./data:/data
    secrets:
      - admin_token
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      ADMIN_TOKEN_FILE: /run/secrets/admin_token
      SIGNUPS_ALLOWED: "${SIGNUPS_ALLOWED:-false}"
      INVITATIONS_ALLOWED: "${INVITATIONS_ALLOWED:-false}"
      SHOW_PASSWORD_HINT: "${SHOW_PASSWORD_HINT:-false}"
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: 8080
      EXTENDED_LOGGING: "true"
      LOG_LEVEL: "${LOG_LEVEL:-warn}"
      LOG_FILE: /data/vaultwarden.log
      TZ: "${TZ:-Europe/Paris}"
    logging: *default-logging
    networks:
      - vaultwarden

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.29-alpine}
    container_name: vaultwarden-nginx
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /var/cache/nginx:rw,noexec,nosuid,size=64m
      - /var/run:rw,noexec,nosuid,size=16m
      - /etc/nginx/conf.d:rw,noexec,nosuid,size=4m
    depends_on:
      - vaultwarden
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./certbot/certs:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    environment:
      NGINX_HOST: ${NGINX_HOST:?Set NGINX_HOST in .env}
      VAULTWARDEN_UPSTREAM: vaultwarden:8080
    logging: *default-logging
    networks:
      - vaultwarden

  certbot:
    image: ${CERTBOT_IMAGE:-certbot/certbot:v5.0.0}
    profiles:
      - certbot
    volumes:
      - ./certbot/certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

secrets:
  admin_token:
    file: ${ADMIN_TOKEN_FILE:-./secrets/admin_token}

networks:
  vaultwarden:
    name: vaultwarden
