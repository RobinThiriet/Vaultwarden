name: Validate

on:
  push:
  pull_request:

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate Docker Compose config
        run: |
          tmp_secret="$(mktemp)"
          tmp_env="$(mktemp)"
          printf '$argon2id$v=19$m=19456,t=2,p=1$placeholder$placeholder\n' > "$tmp_secret"
          {
            printf 'DOMAIN=https://vaultwarden.example.com\n'
            printf 'NGINX_HOST=vaultwarden.example.com\n'
            printf 'ACME_EMAIL=admin@example.com\n'
            printf 'ADMIN_TOKEN_FILE=%s\n' "$tmp_secret"
          } > "$tmp_env"
          docker compose --env-file "$tmp_env" config --quiet
